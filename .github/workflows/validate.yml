name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 08:00 UTC to catch links that go dead over time
    - cron: "0 8 * * 1"

jobs:
  lint-markdown:
    name: Lint markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint markdown
        run: bun run lint

  check-entries:
    name: Check entry format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Validate entry format
        run: bun run check

  validate-links:
    name: Check for broken links
    runs-on: ubuntu-latest
    # Only check links on push to main and the weekly schedule, not on every PR
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run link validator
        run: bun run validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
